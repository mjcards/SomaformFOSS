<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>SomaForm Live</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f14;
  color:white;
}

#landing, #app {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

input, select {
  padding:10px;
  margin:5px;
  width:240px;
  border-radius:8px;
  border:none;
}

button {
  padding:12px 18px;
  border-radius:10px;
  border:none;
  background:#2b6fff;
  color:white;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

#app { display:none; }

#top {
  width:100%;
  height:45vh;
  position:relative;
  background:black;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.9;
}

#status {
  position:absolute;
  bottom:10px;
  left:10px;
  padding:6px 10px;
  background:rgba(0,0,0,0.6);
  border-radius:8px;
  font-size:14px;
}

#analysis {
  width:100%;
  padding:15px;
}

.bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  background:#151b23;
}

.row {
  display:flex;
  align-items:center;
  gap:10px;
}

.dot {
  width:12px;
  height:12px;
  border-radius:50%;
}

.green { background:#2ecc71; }
.orange { background:#f39c12; }
.red { background:#e74c3c; }

.cue {
  font-size:13px;
  opacity:0.9;
}

canvas { display:none; }
</style>

</head>

<body>

<!-- LANDING -->
<div id="landing">
  <h2>SomaForm Live</h2>

  <input id="name" placeholder="Name" />
  <input id="age" placeholder="Age" />

  <select id="gender">
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>

  <input id="key" placeholder="Session Key (optional)" />
  <input id="apiKey" placeholder="Anthropic API Key" />

  <button onclick="start()">Start Session</button>
</div>

<!-- APP -->
<div id="app">

  <div id="top">
    <video id="video" autoplay playsinline muted></video>
    <div id="status">Starting...</div>
  </div>

  <div id="analysis">

    <div class="bar"><div class="row"><div class="dot"></div>Approach</div><div class="cue">...</div></div>
    <div class="bar"><div class="row"><div class="dot"></div>Turn</div><div class="cue">...</div></div>
    <div class="bar"><div class="row"><div class="dot"></div>Push-Off</div><div class="cue">...</div></div>
    <div class="bar"><div class="row"><div class="dot"></div>Breakout</div><div class="cue">...</div></div>

  </div>

</div>

<canvas id="canvas"></canvas>

<script>

let session = null;
let running = false;
let locked = false;
let frameBuffer = [];
let stableState = { phases: null, status: "Starting..." };

const SMOOTH = 0.65;

/* ---------------- START ---------------- */

function start(){

  session = {
    name: document.getElementById('name').value,
    age: document.getElementById('age').value,
    gender: document.getElementById('gender').value,
    key: document.getElementById('key').value,
    apiKey: document.getElementById('apiKey').value
  };

  if (!session.apiKey) {
    alert("API key required");
    return;
  }

  localStorage.setItem("somaform_user", JSON.stringify(session));

  document.getElementById('landing').style.display='none';
  document.getElementById('app').style.display='flex';

  startCamera();
  startLoop();
}

/* ---------------- CAMERA ---------------- */

async function startCamera(){

  const video = document.getElementById("video");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;
  document.getElementById("status").innerText = "Camera active";
}

/* ---------------- FRAME ---------------- */

function captureFrame(){

  const video = document.getElementById("video");
  if (!video.videoWidth) return null;

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 640;
  canvas.height = 360;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  return canvas.toDataURL("image/jpeg", 0.7);
}

/* ---------------- LOOP ---------------- */

function startLoop(){

  if (running) return;
  running = true;

  setInterval(async () => {

    if (locked) return;

    const frame = captureFrame();
    if (!frame) return;

    frameBuffer.push(frame);
    if (frameBuffer.length > 4) frameBuffer.shift();

    locked = true;

    try {
      const raw = await runAnalysis(frameBuffer);
      const smooth = smoothResult(raw);
      updateUI(smooth);
    } catch (e) {
      console.error(e);
    }

    locked = false;

  }, 1800);
}

/* ---------------- API ---------------- */

async function runAnalysis(frames){

  const session = JSON.parse(localStorage.getItem("somaform_user") || "{}");

  const res = await fetch("/.netlify/functions/analyse", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      frames,
      apiKey: session.apiKey
    })
  });

  return await res.json();
}

/* ---------------- STABILITY ENGINE ---------------- */

function smoothResult(newResult){

  if (!newResult || !newResult.phases) return stableState;

  if (!stableState.phases) {
    stableState = newResult;
    return stableState;
  }

  const prev = stableState.phases;

  const blended = newResult.phases.map((p, i) => {

    const old = prev[i] || p;

    return {
      name: p.name,
      score: blend(old.score, p.score),
      note: p.note || old.note
    };
  });

  stableState = {
    status: newResult.status || stableState.status,
    phases: blended,
    summary: newResult.summary
  };

  return stableState;
}

function blend(a, b){

  const map = { green:1, orange:0.5, red:0 };

  const av = map[a] ?? 0.5;
  const bv = map[b] ?? 0.5;

  const v = (av * SMOOTH) + (bv * (1 - SMOOTH));

  if (v > 0.66) return "green";
  if (v > 0.33) return "orange";
  return "red";
}

/* ---------------- UI ---------------- */

function updateUI(result){

  if (!result || !result.phases) return;

  document.getElementById("status").innerText =
    result.status || "Analyzing...";

  const bars = document.getElementsByClassName("bar");

  result.phases.forEach((p, i) => {

    const bar = bars[i];
    if (!bar) return;

    const dot = bar.querySelector(".dot");
    const cue = bar.querySelector(".cue");

    dot.className = `dot ${p.score}`;
    cue.innerText = p.note || p.name;

  });
}

</script>

</body>
</html>
