<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SomaForm — Poolside Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pool:      #0a1628;
    --deep:      #061020;
    --lane:      #0d2240;
    --water:     #0e7ac4;
    --water-lit: #1fa3f5;
    --foam:      #e8f4fd;
    --chalk:     #ffffff;
    --amber:     #f0a500;
    --green:     #00c98d;
    --red:       #f04060;
    --score-bg:  #0d2240;
    --radius:    12px;
    --mono:      'DM Mono', monospace;
    --display:   'Bebas Neue', sans-serif;
    --body:      'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--deep);
    color: var(--chalk);
    font-family: var(--body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--pool);
    border-bottom: 2px solid var(--water);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--display);
    font-size: 1.8rem;
    letter-spacing: 0.06em;
    color: var(--chalk);
    line-height: 1;
  }

  .logo span { color: var(--water-lit); }

  .mode-toggle {
    display: flex;
    gap: 4px;
    background: var(--deep);
    border-radius: 8px;
    padding: 3px;
  }

  .mode-btn {
    padding: 5px 12px;
    border: none;
    border-radius: 6px;
    font-family: var(--body);
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: #7a9ab8;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .mode-btn.active { background: var(--water); color: var(--chalk); }

  /* ── API Key bar ── */
  .api-bar {
    background: var(--lane);
    border-bottom: 1px solid #1a3a5c;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .api-bar label {
    font-size: 0.7rem;
    font-family: var(--mono);
    color: #7a9ab8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .api-bar input {
    flex: 1;
    background: var(--deep);
    border: 1px solid #1a3a5c;
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--chalk);
    font-family: var(--mono);
    font-size: 0.78rem;
  }

  .api-bar input:focus { outline: 1px solid var(--water); border-color: var(--water); }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── Upload zone ── */
  .capture-zone {
    background: var(--pool);
    border: 2px dashed #1a3a5c;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 220px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .capture-zone.has-video { border-style: solid; border-color: var(--water); }
  .capture-zone.dragover  { border-color: var(--water-lit); background: #0a1e38; }

  #preview {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    display: none;
    border-radius: calc(var(--radius) - 2px);
  }

  #preview.visible { display: block; }

  .upload-prompt {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: #4a7a9b;
    padding: 20px;
    text-align: center;
  }

  .upload-prompt svg { opacity: 0.5; }
  .upload-prompt p { font-size: 0.85rem; line-height: 1.5; }
  .upload-prompt strong { color: var(--water-lit); }

  .upload-btn {
    background: var(--water);
    color: var(--chalk);
    border: none;
    border-radius: 8px;
    padding: 11px 24px;
    font-family: var(--body);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 6px;
  }

  .upload-btn:hover { background: var(--water-lit); }
  #fileInput { display: none; }

  /* ── Stroke selector ── */
  .stroke-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .stroke-chip {
    padding: 6px 14px;
    border: 1px solid #1a3a5c;
    border-radius: 20px;
    background: transparent;
    color: #7a9ab8;
    font-family: var(--body);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }

  .stroke-chip.active {
    background: var(--water);
    border-color: var(--water);
    color: var(--chalk);
  }

  /* ── Analyse button ── */
  .analyse-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--water) 0%, #0558a0 100%);
    color: var(--chalk);
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-family: var(--display);
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .analyse-btn:hover { opacity: 0.92; }
  .analyse-btn:active { transform: scale(0.99); }
  .analyse-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .analyse-btn .spinner {
    display: none;
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  .analyse-btn.loading .spinner { display: block; }
  .analyse-btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty state ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 32px 20px;
    color: #2a4a6b;
    text-align: center;
    border: 1px dashed #1a3a5c;
    border-radius: var(--radius);
    font-size: 0.85rem;
    line-height: 1.5;
  }

  .empty-state svg { opacity: 0.3; margin-bottom: 6px; }

  /* ── Results section header ── */
  .results-header {
    display: none;
    align-items: center;
    gap: 12px;
  }

  .results-header.visible { display: flex; }

  .stroke-badge {
    font-family: var(--display);
    font-size: 1.3rem;
    letter-spacing: 0.06em;
    color: var(--water-lit);
  }

  .overall-pill {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid;
    font-weight: 500;
  }

  .overall-pill.green { color: var(--green); border-color: var(--green); }
  .overall-pill.amber { color: var(--amber); border-color: var(--amber); }
  .overall-pill.red   { color: var(--red);   border-color: var(--red);   }

  /* ══════════════════════════════════════
     SKILL CARDS — the new core UI
  ══════════════════════════════════════ */
  .skill-cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .skill-card {
    background: var(--pool);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid #1a3a5c;
    animation: cardIn 0.3s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .skill-card:nth-child(1) { animation-delay: 0.05s; }
  .skill-card:nth-child(2) { animation-delay: 0.10s; }
  .skill-card:nth-child(3) { animation-delay: 0.15s; }
  .skill-card:nth-child(4) { animation-delay: 0.20s; }
  .skill-card:nth-child(5) { animation-delay: 0.25s; }

  .skill-card.status-green { border-left: 4px solid var(--green); }
  .skill-card.status-amber { border-left: 4px solid var(--amber); }
  .skill-card.status-red   { border-left: 4px solid var(--red);   }

  /* Card top row: thumbnail + diagram + status */
  .card-top {
    display: flex;
    align-items: stretch;
    height: 100px;
  }

  /* Frame thumbnail */
  .card-thumb {
    width: 110px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    background: #020810;
  }

  .card-thumb canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.85;
  }

  .card-thumb .no-thumb {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1a3a5c;
    font-size: 0.65rem;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: center;
    padding: 4px;
  }

  /* Phase diagram */
  .card-diagram {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    background: #080f1e;
  }

  .card-diagram svg {
    width: 100%;
    max-width: 120px;
    height: auto;
  }

  /* Status block */
  .card-status {
    width: 72px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px 6px;
  }

  .status-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }

  .status-green .status-dot { background: rgba(0,201,141,0.18); color: var(--green); border: 2px solid var(--green); }
  .status-amber .status-dot { background: rgba(240,165,0,0.18);  color: var(--amber); border: 2px solid var(--amber); }
  .status-red   .status-dot { background: rgba(240,64,96,0.18);  color: var(--red);   border: 2px solid var(--red);   }

  .status-word {
    font-family: var(--mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
  }

  .status-green .status-word { color: var(--green); }
  .status-amber .status-word { color: var(--amber); }
  .status-red   .status-word { color: var(--red);   }

  .status-score {
    font-family: var(--display);
    font-size: 1.3rem;
    line-height: 1;
  }

  .status-green .status-score { color: var(--green); }
  .status-amber .status-score { color: var(--amber); }
  .status-red   .status-score { color: var(--red);   }

  /* Card bottom: phase name + coaching cue */
  .card-body {
    padding: 12px 14px;
    border-top: 1px solid #0d2240;
  }

  .card-phase-name {
    font-family: var(--mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #4a7a9b;
    margin-bottom: 4px;
  }

  .card-cue {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--chalk);
  }

  .card-detail {
    margin-top: 6px;
    font-size: 0.8rem;
    line-height: 1.55;
    color: #8ab0cc;
  }

  /* ── Coach report ── */
  .coach-report {
    background: var(--pool);
    border: 1px solid #1a3a5c;
    border-radius: var(--radius);
    padding: 16px;
    display: none;
  }

  .coach-report.visible { display: block; }

  .coach-report h3 {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #4a7a9b;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .coach-report h3::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1a3a5c;
  }

  .coach-text {
    font-size: 0.85rem;
    line-height: 1.75;
    color: #a0c4e0;
    white-space: pre-wrap;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 14px;
    font-size: 0.68rem;
    color: #2a4a6b;
    font-family: var(--mono);
    border-top: 1px solid #0d2240;
  }

  footer a { color: #3a6a9b; text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="logo">Soma<span>Form</span></div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('coach')">Coach</button>
    <button class="mode-btn" onclick="setMode('swimmer')">Swimmer</button>
  </div>
</header>

<div class="api-bar">
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
</div>

<main>
  <!-- Upload -->
  <div>
    <div class="capture-zone" id="captureZone"
         ondragover="handleDragOver(event)"
         ondragleave="handleDragLeave(event)"
         ondrop="handleDrop(event)">
      <video id="preview" playsinline muted controls></video>
      <div class="upload-prompt" id="uploadPrompt">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="6" width="20" height="14" rx="2"/>
          <circle cx="12" cy="13" r="3"/>
          <path d="M7 6V5a2 2 0 012-2h6a2 2 0 012 2v1"/>
        </svg>
        <p><strong>Poolside video analysis</strong><br>
        Upload a clip from the end of the lane.</p>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
          📹 Select Video
        </button>
      </div>
      <input type="file" id="fileInput" accept="video/*,image/*" onchange="handleFile(event)">
    </div>

    <div class="stroke-row" style="margin-top:12px;">
      <button class="stroke-chip active" onclick="selectStroke(this,'auto')">Auto-detect</button>
      <button class="stroke-chip" onclick="selectStroke(this,'freestyle')">Freestyle</button>
      <button class="stroke-chip" onclick="selectStroke(this,'backstroke')">Backstroke</button>
      <button class="stroke-chip" onclick="selectStroke(this,'breaststroke')">Breaststroke</button>
      <button class="stroke-chip" onclick="selectStroke(this,'butterfly')">Butterfly</button>
    </div>

    <button class="analyse-btn" id="analyseBtn" onclick="analyse()" disabled style="margin-top:12px;">
      <span class="btn-text">ANALYSE</span>
      <div class="spinner"></div>
    </button>
  </div>

  <!-- Results header -->
  <div class="results-header" id="resultsHeader">
    <div class="stroke-badge" id="strokeBadge">—</div>
    <div class="overall-pill" id="overallPill">—</div>
  </div>

  <!-- Skill cards -->
  <div class="skill-cards" id="skillCards"></div>

  <!-- Coach report -->
  <div class="coach-report" id="coachReport">
    <h3>Coach Report</h3>
    <div class="coach-text" id="coachText"></div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
    </svg>
    Upload a poolside video and tap Analyse.
  </div>
</main>

<footer>
  SomaForm · Open Source · AGPL v3 ·
  <a href="https://github.com/mjcards/SomaformFOSS">GitHub</a> ·
  Framework grounded in the work of Dr. Ernest W. Maglischo
</footer>

<script>
// ── State ──
let selectedStroke = 'auto';
let mediaData      = null;
let mediaType      = null;
let currentMode    = 'coach';
let capturedFrame  = null; // ImageData / dataURL of the extracted frame

// ── SVG diagrams per phase ──
// Simple, clear line illustrations showing the key body position for each phase
const PHASE_DIAGRAMS = {
  'Approach': {
    good: `<svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
      <!-- Body streamlined, arm pulling through -->
      <ellipse cx="90" cy="30" rx="8" ry="5" fill="none" stroke="#00c98d" stroke-width="1.8"/>
      <line x1="82" y1="30" x2="20" y2="30" stroke="#00c98d" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="30" x2="8" y2="20" stroke="#00c98d" stroke-width="2" stroke-linecap="round"/>
      <line x1="82" y1="30" x2="100" y2="38" stroke="#00c98d" stroke-width="2" stroke-linecap="round"/>
      <!-- water line -->
      <line x1="0" y1="42" x2="120" y2="42" stroke="#0e7ac4" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <!-- arrow showing direction -->
      <path d="M110 30 L100 25 M110 30 L100 35" stroke="#1fa3f5" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <text x="60" y="56" fill="#4a7a9b" font-size="7" text-anchor="middle" font-family="monospace">STREAMLINED PULL</text>
    </svg>`,
    warn: `<svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
      <!-- Head lifting, hips dropping -->
      <ellipse cx="90" cy="26" rx="8" ry="5" fill="none" stroke="#f0a500" stroke-width="1.8"/>
      <line x1="82" y1="28" x2="40" y2="36" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
      <line x1="40" y1="36" x2="12" y2="28" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
      <!-- downward arrow on hips -->
      <path d="M55 34 L55 44" stroke="#f04060" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M55 44 L51 39 M55 44 L59 39" stroke="#f04060" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <line x1="0" y1="42" x2="120" y2="42" stroke="#0e7ac4" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <text x="60" y="56" fill="#4a7a9b" font-size="7" text-anchor="middle" font-family="monospace">HIPS DROPPING</text>
    </svg>`
  },
  'Into Wall': {
    good: `<svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
      <!-- Wall on right, hand flat, body parallel -->
      <rect x="108" y="10" width="6" height="40" fill="#1a3a5c" rx="1"/>
      <ellipse cx="22" cy="30" rx="8" ry="5" fill="none" stroke="#00c98d" stroke-width="1.8"/>
      <line x1="30" y1="30" x2="100" y2="30" stroke="#00c98d" stroke-width="2" stroke-linecap="round"/>
      <rect x="98" y="26" width="10" height="8" rx="2" fill="none" stroke="#00c98d" stroke-width="1.8"/>
      <line x1="0" y1="42" x2="120" y2="42" stroke="#0e7ac4" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <text x="55" y="56" fill="#4a7a9b" font-size="7" text-anchor="middle" font-family="monospace">FLAT TOUCH · LEVEL</text>
    </svg>`,
    warn: `<svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
      <!-- Reaching in at angle, body twisted -->
      <rect x="108" y="10" width="6" height="40" fill="#1a3a5c" rx="1"/>
      <ellipse cx="22" cy="34" rx="8" ry="5" fill="none" stroke="#f0a500" stroke-width="1.8"/>
      <line x1="30" y1="32" x2="85" y2="26" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
      <rect x="83" y="20" width="9" height="7" rx="2" fill="none" stroke="#f04060" stroke-width="1.8" transform="rotate(-20 87 24)"/>
      <!-- warning arc -->
      <path d="M100 15 Q110 22 108 30" stroke="#f04060" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
      <line x1="0" y1="44" x2="120" y2="44" stroke="#0e7ac4" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <text x="55" y="56" fill="#4a7a9b" font-size="7" text-anchor="middle" font-family="monospace">ANGLED / RUSHED</text>
    </svg>`
  },
  'Turn': {
    good: `<svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
      <!-- Tight tuck, wall on right -->
      <rect x="108" y="10" width="6" height="40" fill="#1a3a5c" rx="1"/>
      <!-- tucked body arc -->
      <path d="M95 30 Q80 10 60 20 Q40 30 50 48 Q65 58 85 48" fill="none" stroke="#00c98d" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="96" cy="30" rx="7" ry="5" fill="none" stroke="#00c98d" stroke-width="1.8"/>
      <!-- rotation arrow -->
      <path d="M70 18 Q60 8 50 18" stroke="#1fa3f5" stroke-width="1.5" fill="none"/>
      <path d="M50 18 L52 12 M50 18 L56 20" stroke="#1fa3f5" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <line x1="0" y1="50" x2="108" y2="50" stroke="#0e7ac4" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <text x="55" y="58" fill="#4a7a9b" font-size="7" text-anchor="middle" font-family="monospace">TIGHT TUCK · FAST</text>
    </svg>`,
    warn: `<svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">

// ── Mode ──
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.toLowerCase().startsWith(mode))
  );
}

// ── Stroke ──
function selectStroke(el, stroke) {
  document.querySelectorAll('.stroke-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedStroke = stroke;
}

// ── File handling ──
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  loadFile(file);
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('captureZone').classList.add('dragover');
}

function handleDragLeave() {
  document.getElementById('captureZone').classList.remove('dragover');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('captureZone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
}

function loadFile(file) {
  const preview  = document.getElementById('preview');
  const prompt   = document.getElementById('uploadPrompt');
  const zone     = document.getElementById('captureZone');
  capturedFrame  = null;
  mediaType = file.type.startsWith('image') ? 'image' : 'video';

  if (mediaType === 'video') {
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    preview.classList.add('visible');
    prompt.style.display = 'none';
    zone.classList.add('has-video');

    preview.addEventListener('loadeddata', () => {
      preview.currentTime = Math.min(1, preview.duration * 0.4);
    }, { once: true });

    preview.addEventListener('seeked', () => {
      const canvas = document.createElement('canvas');
      canvas.width  = preview.videoWidth;
      canvas.height = preview.videoHeight;
      canvas.getContext('2d').drawImage(preview, 0, 0);
      capturedFrame = canvas.toDataURL('image/jpeg', 0.85);
      mediaData = capturedFrame.split(',')[1];
    }, { once: true });

  } else {
    preview.style.display = 'none';
    const img = document.createElement('img');
    img.style.cssText = 'max-width:100%;max-height:300px;object-fit:contain;border-radius:10px;';
    const objectURL = URL.createObjectURL(file);
    img.src = objectURL;
    capturedFrame = objectURL;
    zone.innerHTML = '';
    zone.appendChild(img);
    zone.classList.add('has-video');

    const reader = new FileReader();
    reader.onload = ev => {
      capturedFrame = ev.target.result;
      mediaData = ev.target.result.split(',')[1];
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('analyseBtn').disabled = false;
}

// ── Score → status ──
function scoreStatus(score) {
  if (score >= 7.5) return 'green';
  if (score >= 5)   return 'amber';
  return 'red';
}

function statusIcon(status) {
  if (status === 'green') return '✓';
  if (status === 'amber') return '~';
  return '!';
}

function statusWord(status) {
  if (status === 'green') return 'GOOD';
  if (status === 'amber') return 'OK';
  return 'WORK ON';
}

// ── Render a skill card ──
function renderCard(phase, index) {
  const status = scoreStatus(phase.score);
  const diagrams = PHASE_DIAGRAMS[phase.name] || PHASE_DIAGRAMS['Approach'];
  const svg = status === 'green' ? diagrams.good : diagrams.warn;

  const card = document.createElement('div');
  card.className = `skill-card status-${status}`;
  card.style.animationDelay = `${index * 0.06}s`;

  // Build thumbnail HTML
  let thumbHTML = '';
  if (capturedFrame && capturedFrame.startsWith('data:')) {
    thumbHTML = `<img src="${capturedFrame}" style="width:100%;height:100%;object-fit:cover;opacity:0.8;display:block;" alt="rep frame">`;
  } else {
    thumbHTML = `<div class="no-thumb">Last<br>Rep</div>`;
  }

  // Coaching-friendly cue (will be filled after API returns)
  const cue = phase.cue || '';
  const detail = phase.detail || '';

  card.innerHTML = `
    <div class="card-top">
      <div class="card-thumb">${thumbHTML}</div>
      <div class="card-diagram">${svg}</div>
      <div class="card-status">
        <div class="status-dot">${statusIcon(status)}</div>
        <div class="status-word">${statusWord(status)}</div>
        <div class="status-score">${phase.score.toFixed(1)}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-phase-name">${phase.name}</div>
      <div class="card-cue">${cue}</div>
      ${detail ? `<div class="card-detail">${detail}</div>` : ''}
    </div>
  `;

  return card;
}

// ── Analysis ──
async function analyse() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Please enter your Anthropic API key.'); return; }
  if (!mediaData) { alert('Please upload a video or image first.'); return; }

  const btn = document.getElementById('analyseBtn');
  btn.disabled = true;
  btn.classList.add('loading');

  // Hide previous results
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('skillCards').innerHTML = '';
  document.getElementById('resultsHeader').classList.remove('visible');
  document.getElementById('coachReport').classList.remove('visible');

  const strokeNote = selectedStroke === 'auto'
    ? 'Identify the stroke automatically from what you can see.'
    : `The stroke being performed is ${selectedStroke}.`;

  const prompt = `You are SomaForm, a poolside swimming technique analyser grounded in the biomechanical framework of Dr. Ernest W. Maglischo (Swimming Fastest, 2003).

This image is from a camera at the end of a swimming lane. ${strokeNote}

Analyse visible phases: Approach, Into Wall, Turn, Push-Off, Breakout.

Respond ONLY with a valid JSON object — no markdown, no preamble, no trailing text:

{
  "stroke": "freestyle|backstroke|breaststroke|butterfly|unknown",
  "overall": <0-10 number>,
  "phases": [
    {
      "name": "Approach",
      "score": <0-10>,
      "visible": true,
      "cue": "<one short coaching cue in plain spoken language, max 10 words, e.g. 'Keep your hips high as you approach the wall'>",
      "detail": "<one sentence of what you saw and why it matters, plain language, no jargon>"
    }
  ],
  "coach_report": "<2-3 sentences of overall observations for the coach, plain language, reference Maglischo principles>"
}

Only include phases where visible is true. Use simple, encouraging, spoken coaching language in cue and detail — imagine speaking directly to the swimmer poolside.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1200,
        messages: [{
          role: 'user',
          content: [{
            type: 'image',
            source: { type: 'base64', media_type: 'image/jpeg', data: mediaData }
          }, {
            type: 'text',
            text: prompt
          }]
        }]
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'API error');
    }

    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    renderResults(result);

  } catch (err) {
    alert('Analysis failed: ' + err.message);
    document.getElementById('emptyState').style.display = 'flex';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function renderResults(result) {
  // Header
  const header = document.getElementById('resultsHeader');
  const strokeBadge = document.getElementById('strokeBadge');
  const overallPill = document.getElementById('overallPill');

  const strokeLabel = (result.stroke || 'unknown').toUpperCase();
  strokeBadge.textContent = strokeLabel;

  const overallStatus = scoreStatus(result.overall);
  overallPill.className = `overall-pill ${overallStatus}`;
  overallPill.textContent = `${result.overall.toFixed(1)} / 10`;

  header.classList.add('visible');

  // Skill cards
  const container = document.getElementById('skillCards');
  container.innerHTML = '';
  const visiblePhases = (result.phases || []).filter(p => p.visible);
  visiblePhases.forEach((phase, i) => {
    container.appendChild(renderCard(phase, i));
  });

  // Coach report (coach mode only)
  if (result.coach_report) {
    const report = document.getElementById('coachReport');
    document.getElementById('coachText').textContent = result.coach_report;
    if (currentMode === 'coach') {
      report.classList.add('visible');
    }
  }
}
</script>
